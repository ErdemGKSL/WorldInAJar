# Entity preview backend: manequeen (built-in) or protocol (requires ProtocolLib with 1.21.11 support).
# "mannequin" is also accepted as an alias for manequeen.
entity-preview: manequeen

# Interior edge length in blocks. Existing jars retain the scale they were created with.
# Note: previewed players/entities are resized with Minecraft's scale attribute, which the
# game clamps to 1/16..16 on every client. With scale above 16, blocks still scale fully
# but previewed entities cap at 16x (and miniatures at 1/16th).
jar:
  scale: 32
  # Maximum exterior width, height, or depth, in glass blocks, for attached jar assemblies.
  # Horizontal size is also constrained by interior.allocation-stride; height is constrained
  # by the interior world's build limit.
  max-combined-size: 9
  # Minutes a player must continuously keep a jar item in their inventory before they become
  # its "last holder", allowing them to recall it later with /jar back.
  last-holder-minutes: 5

# Isolation of jar interiors from the real world. Changes apply on /jar reload.
isolation:
  # Block external teleports (commands, other plugins, ender pearls, spectating) from crossing
  # between jar interiors and the outside world. Outside->inside teleports are redirected to the
  # jar's real-world location instead; inside->outside teleports are cancelled. Plugin-driven
  # movement (portals, spectating via jar items, /jar admin commands) is never affected.
  teleports: true
  # Deaths inside a jar respawn inside that jar, and right-clicking a bed inside a jar saves a
  # per-jar respawn point instead of setting a vanilla spawn. When disabled, vanilla respawn
  # rules apply everywhere.
  respawns: true

interior:
  world: world_in_a_jar
  base-y: 64
  cell-gap: 24
  # Fixed allocation spacing prevents cells created under different scale settings overlapping.
  # Keep this at least jar.scale * jar.max-combined-size.
  allocation-stride: 320
  mob-spawning: true
  # Combination world edits stay on the server thread but are distributed across ticks.
  # The runner stops when either limit is reached, whichever happens first.
  combination-blocks-per-tick: 2048
  combination-max-millis-per-tick: 2.0

preview:
  # Viewer visibility and full entity-state reconciliation run on this interval.
  # Movement of previewed entities and player markers is synced every server tick.
  update-ticks: 5
  # Delay for event-driven block preview updates. 1 refreshes on the next server tick.
  # Nearby changes are coalesced into one refresh to keep rapid building responsive.
  block-update-ticks: 1
  # Block scenes use fingerprints and are only rebuilt when sampled block data changes.
  # This slower full scan catches block changes that do not emit a handled place/break event.
  block-refresh-ticks: 100

  exterior:
    enabled: true
    # Only players in the jar's outside world and within this distance receive virtual entity packets.
    viewer-distance: 6.0
    # Hard caps for virtual interior block displays and occupant mannequins per jar.
    max-blocks: 2048
    max-player-markers: 16
    # Used by entity-preview: protocol. Includes players, mobs, items and projectiles.
    max-entities: 64

  interior:
    enabled: true
    # 3D radius of outside blocks around, above, and below the jar rendered for occupants.
    outside-radius: 12
    # Exact outside-world blocks visible to occupants. Keep this above the exposed block count
    # for the configured radius; blocks are never stretched or substituted to meet this limit.
    max-blocks: 4096
    max-player-markers: 16
    # Used by entity-preview: protocol. Includes players, mobs, items and projectiles.
    max-entities: 64
    # Represent nearby outside players with viewer-specific virtual mannequins.
    show-players: true
